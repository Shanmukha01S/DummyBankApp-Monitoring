# =============================================
# NGINX LOAD BALANCER CONFIG
# File: /etc/nginx/conf.d/bankapp.conf
# =============================================
#
# This is the Nginx config for load balancing
# between two Tomcat app server instances.
#
# ARCHITECTURE:
#
#   Browser
#     ↓
#   Nginx :80  (this server — load balancer)
#     ↙        ↘
# Tomcat-1    Tomcat-2
# :8080        :8080
# (EC2-1)     (EC2-2)
#
# HOW TO USE:
# 1. Install Nginx on your load balancer EC2
# 2. Copy this file to /etc/nginx/conf.d/bankapp.conf
# 3. Run: sudo nginx -t        (test config)
# 4. Run: sudo systemctl reload nginx
# =============================================


# UPSTREAM BLOCK — defines the group of backend servers
# Nginx will distribute requests between these servers
upstream bankapp_cluster {

    # Load balancing algorithm options:
    # (default = round-robin: sends req1→server1, req2→server2, req3→server1...)

    # Round Robin (default) — good for stateless apps
    # least_conn;   — sends to server with fewest active connections (better for long requests)
    # ip_hash;      — same client always goes to same server (needed for sticky sessions)

    # For our app: sessions are stored in Tomcat, so we need ip_hash
    # OR we configure session replication between Tomcats
    ip_hash;

    # Your two app server instances
    # Replace with actual private IPs of your EC2 instances
    server 172.31.0.10:8080 weight=1;   # EC2 App Server 1
    server 172.31.0.11:8080 weight=1;   # EC2 App Server 2

    # weight=1 means equal traffic split (50/50)
    # weight=2 on one server means it gets 2x the traffic

    # Health check: if a server fails 3 times within 30s,
    # stop sending traffic to it for 30 seconds
    # (Nginx Plus feature; basic nginx uses fail_timeout)
}


# SERVER BLOCK — defines how Nginx listens and routes
server {

    listen 80;                          # Listen on port 80 (HTTP)
    server_name _;                      # Accept any hostname (use your domain in production)

    # Access and error logs
    access_log /var/log/nginx/bankapp_access.log;
    error_log  /var/log/nginx/bankapp_error.log;

    # =============================================
    # MAIN PROXY LOCATION
    # Forward all requests to the upstream cluster
    # =============================================
    location / {
        proxy_pass         http://bankapp_cluster;   # Send to one of the Tomcats

        # Pass real client IP to Tomcat (otherwise Tomcat sees Nginx IP)
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;

        # Buffer settings (improves performance)
        proxy_buffering    on;
        proxy_buffer_size  4k;
    }

    # =============================================
    # HEALTH CHECK ENDPOINT
    # Allows monitoring tools to verify Nginx is alive
    # Visit: http://your-lb-ip/health
    # =============================================
    location /health {
        access_log off;
        return 200 "Nginx Load Balancer OK\n";
        add_header Content-Type text/plain;
    }

    # =============================================
    # SECURITY HEADERS
    # Best practice — add to every response
    # =============================================
    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-XSS-Protection       "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
}
